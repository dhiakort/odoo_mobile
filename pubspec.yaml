name: odoo_mobile
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # UI / icons
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.2.0
  cached_network_image: ^3.4.1

  # State management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^16.0.0

  # Networking
  dio: ^5.9.0

  # Storage
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.5.3

  # JSON parsing
  json_annotation: ^4.9.0

  # Utils
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  build_runner: ^2.5.4
  json_serializable: ^6.9.5

flutter:
  uses-material-design: true